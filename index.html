<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Good Website NZ — Trade Templates</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0b0b17;color:#fff;padding:40px 24px;text-align:center}
h1{font-size:2em;margin-bottom:8px;background:linear-gradient(135deg,#38bdf8,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
p{color:rgba(255,255,255,.5);margin-bottom:24px;font-size:.95em;max-width:600px;margin-left:auto;margin-right:auto}
.templates{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;max-width:800px;margin:0 auto}
a{display:block;padding:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;color:rgba(255,255,255,.7);text-decoration:none;font-size:.9em;transition:all .2s}
a:hover{background:rgba(56,189,248,.1);border-color:#38bdf8;color:#fff;transform:translateY(-2px)}
</style>
</head>
<body>
<h1>🧰 NZ Trade Templates</h1>
<p>6 generic trade templates — use these as the starting point for new brochure sites.</p>
<div class="templates">
<a href="https://goodwebsitenz.github.io/nz-brochures/">⚡ Electrician</a>
<a href="https://goodwebsitenz.github.io/nz-brochures/">🎨 Painter</a>
<a href="https://goodwebsitenz.github.io/nz-brochures/">🪚 Carpenter</a>
<a href="https://goodwebsitenz.github.io/nz-brochures/">🌿 Landscaper</a>
<a href="https://goodwebsitenz.github.io/nz-brochures/">🔧 Plumber</a>
<a href="https://goodwebsitenz.github.io/nz-brochures/">🏗️ Builder</a>
</div>
<p style="margin-top:40px;font-size:.8em;color:rgba(255,255,255,.2)">Business-specific mockup sites removed. Templates stored locally in ~/Desktop/templates/</p>
</body>
</html>
